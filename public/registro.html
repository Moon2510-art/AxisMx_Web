<!DOCTYPE html>
<html lang="es">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Registros | AxisMX</title>
      <link rel="stylesheet" href="./css/dashboard.css">
   </head>
   <body>
      <div class="layout">
         <aside class="sidebar">
            <img src="/assets/logo2.png" width="180" class="top-centered-image">
            <h2 class="logo">AxisMX</h2>
            <nav>
               <a href="dashboard.html">Dashboard</a>
               <a class="active">Bitácora de Acceso</a>
               <a href="usuarios.html">Usuarios</a>
               <a href="roles.html">Roles</a>
               <a href="visitantes.html">Visitantes</a>
               <a href="vehiculos.html">Vehículos</a>
            </nav>

         </aside>
         <main class="main">
            <header class="header">
               <h1>Bitácora de Acceso</h1>
                     <button id="btnPDF">Exportar Pdf</button>
                     <button id="btnExcel">Exportar Excel</button>
               <div class="user" id="userCard">
                <img src="/assets/user.png" width="40" height="40">
            <div>
            <strong id="userName">Admin</strong>
            <span id="userRole">...</span>
            </div>

            </header>
            <section class="filter-bar">
               <input id="search" type="text" placeholder="Buscar usuario, credencial o placa" class="search">
               <select id="tipo">
                  <option value="">Tipo</option>
                  <option value="QR">QR</option>
                  <option value="Placa">Placa</option>
               </select>
               <select id="estado">
                  <option value="">Estado</option>
                  <option value="1">Permitido</option>
                  <option value="0">Denegado</option>
               </select>
               <input id="fecha" type="date">

            </section>
            <section class="table-section">
               <div class="pdfContent" id="pdfContent">
               <table>
                  <thead>
                     <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Usuario</th>
                        <th>Credencial / Vehículo</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                     </tr>
                  </thead>
                  <tbody id="tableBody">
                     <tr>
                        <td colspan="6">Cargando...</td>
                     </tr>
                  </tbody>
               </table>
               </div>
            </section>
         </main>
      </div>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
      <script src="/js/access.js"></script>

   </body>
</html>
