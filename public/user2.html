<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil | AxisMX</title>
<link rel="stylesheet" href="./css/dashboard.css">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <img src="/assets/logo2.png" alt="AxisMX logo" width="200" height="200" class="top-centered-image" onerror="this.style.display='none'">
        <h2 class="logo">AxisMX</h2>

        <nav>
               <a href="dashboard2.html">Dashboard</a>
               <a href="registro2.html">Bitácora de Acceso</a>
               <a href="vehiculos2.html">Vehiculos</a>
            </nav>
    </aside>

    <main class="main">

            <header class="header">
                <h1>Mi Perfil</h1>
                <div class="header-actions">

        <button class="btn small danger" onclick="logout()">
            Cerrar sesión
        </button>

</div>
        </header>

        <section class="profile-grid">

            <div class="profile-card">
                <img src="/assets/user2.png" class="avatar-large">

                <h2 id="name">Nombre</h2>
                <span id="role" class="role-text"></span>


                <div class="quick-info">
                    <p><strong>Email:</strong> <span id="email"></span></p>
                    <p><strong>Teléfono:</strong> <span id="phone"></span></p>
                    <p><strong>Empresa:</strong> <span id="company"></span></p>
                </div>

                <button class="btn" onclick="openPasswordModal()">
                    Cambiar contraseña
                </button>
            </div>

            <div class="profile-details">

                <div class="detail-card">
                    <h3>Información General</h3>

                    <div class="detail-row">
                        <span>Matrícula</span>
                        <span id="matricula"></span>
                    </div>

                    <div class="detail-row">
                        <span>No. Empleado</span>
                        <span id="employee"></span>
                    </div>

                    <div class="detail-row">
                        <span>Rol</span>
                        <span id="roleDetail"></span>
                    </div>

                    <div class="detail-row">
                        <span>Estado</span>
                        <span id="status" class="status-badge"></span>
                    </div>
                </div>

                <div class="detail-card">
                    <h3>Cuenta</h3>

                    <div class="detail-row">
                        <span>Email</span>
                        <span id="emailDetail"></span>
                    </div>

                    <div class="detail-row">
                        <span>Teléfono</span>
                        <span id="phoneDetail"></span>
                    </div>
                </div>

            </div>

        </section>

    </main>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h3>Cambiar contraseña</h3>
            <span class="close" onclick="closePasswordModal()">✖</span>
        </div>

        <div class="modal-body">

            <input type="password" id="currentPassword" placeholder="Contraseña actual">
            <input type="password" id="newPassword" placeholder="Nueva contraseña">
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">

        </div>

        <div class="modal-footer">
            <button class="btn cancel" onclick="closePasswordModal()">Cancelar</button>
            <button class="btn" onclick="changePassword()">Guardar</button>
        </div>

    </div>
</div>

<script src="/js/user.js"></script>

</body>
</html>
