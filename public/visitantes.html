<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Visitantes | AxisMX</title>
   <link rel="stylesheet" href="./css/dashboard.css">
</head>

<body>
<div class="layout">

   <aside class="sidebar">
      <img src="/assets/logo2.png" width="180" class="top-centered-image">
      <h2 class="logo">AxisMX</h2>
      <nav>
         <a href="dashboard.html">Dashboard</a>
         <a href="registro.html">Bitácora de Acceso</a>
         <a href="usuarios.html">Usuarios</a>
         <a href="roles.html">Roles</a>
         <a class="active">Visitantes</a>
         <a href="vehiculos.html">Vehículos</a>
      </nav>
   </aside>

   <main class="main">

      <header class="header">
         <h1>Visitantes</h1>

         <button id="btnPDF">Exportar Pdf</button>
         <button id="btnExcel">Exportar Excel</button>

         <div class="user" id="userCard">
            <img src="/assets/user.png" width="40" height="40">
            <div>
               <strong id="userName">Admin</strong>
               <span id="userRole">...</span>
            </div>
         </div>
      </header>

      <section class="filter-bar">
         <input id="search" type="text" placeholder="Buscar visitante o compañía..." class="search">

         <select id="estado">
            <option value="">Estado</option>
            <option value="Aprobada">Aprobada</option>
            <option value="Rechazada">Rechazada</option>
            <option value="Pendiente">Pendiente</option>
         </select>

      </section>

      <section class="table-section">
         <div class="pdfContent" id="pdfContent">

            <table>
               <thead>
                  <tr>
                     <th>ID</th>
                     <th>Nombre</th>
                     <th>Compañía</th>
                     <th>Email</th>
                     <th>Teléfono</th>
                     <th>Estado</th>
                     <th>QR</th>
                     <th>Acciones</th>
                  </tr>
               </thead>

               <tbody id="visitantesTable">
                  <tr>
                     <td colspan="7">Cargando...</td>
                  </tr>
               </tbody>
            </table>

         </div>
      </section>

   </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
<script src="/js/visitantes.js"></script>

</body>
</html>
