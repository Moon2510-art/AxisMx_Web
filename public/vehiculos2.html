   <!DOCTYPE html>
   <html lang="es">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Vehículos | AxisMX</title>
      <link rel="stylesheet" href="./css/dashboard.css" />
   </head>

   <body>

   <div class="layout">

      <aside class="sidebar">
         <img src="/assets/logo2.png" width="180" class="top-centered-image">
         <h2 class="logo">AxisMX</h2>

         <nav>
            <a href="dashboard2.html">Dashboard</a>
            <a href="registro2.html">Bitácora de Acceso</a>
            <a class="active">Vehículos</a>
         </nav>
      </aside>

      <main class="main">

         <header class="header">
            <h1>Vehículos</h1>
            <div class="user" id="userCard">
               <img src="/assets/user2.png" width="40" height="40">
               <div>
                  <strong id="userName">User</strong>
               </div>
         </header>

         <section class="filter-bar">

            <input id="search" class="search" placeholder="Buscar placa o modelo">

            <select id="estado">
               <option value="">Estado</option>
               <option value="Activo">Activo</option>
               <option value="Suspendido">Inactivo</option>
            </select>

            <button class="btn add" onclick="openCreateModal()">+ Nuevo</button>

         </section>

         <section class="table-section">
            <table>
               <thead>
                  <tr>
                     <th>ID</th>
                     <th>Placa</th>
                     <th>Modelo</th>
                     <th>Año</th>
                     <th>Color</th>
                     <th>Propietario</th>
                     <th>Estado</th>
                     <th>Acciones</th>
                  </tr>
               </thead>

               <tbody id="tableBody">
                  <tr>
                     <td colspan="7">Cargando vehículos...</td>
                  </tr>
               </tbody>
            </table>
         </section>

      </main>

   </div>

   <div id="vehiculoModal" class="modal">
      <div class="modal-content">

         <div class="modal-header">
            <h3 id="modalTitle">Nuevo Vehículo</h3>
            <span class="close" onclick="closeModal()">✖</span>
         </div>

         <div class="modal-body form-grid">

            <input type="hidden" id="vehiculo_id">

            <div class="form-group">
               <label>Placa</label>
               <input id="placa">
            </div>

            <div class="form-group">
               <label>Modelo</label>
               <select id="modelo">
                  <option value="">Seleccionar modelo</option>
               </select>
            </div>

            <div class="form-group">
               <label>Año</label>
               <input id="anio" type="number">
            </div>

            <div class="form-group">
               <label>Color</label>
               <input id="color">
            </div>

            <div class="form-group">
               <label>Propietario</label>
               <select id="user">
                  <option value="">Seleccionar usuario</option>
               </select>
            </div>

            <div class="modal-footer">
               <button class="btn cancel" onclick="closeModal()">Cancelar</button>
               <button class="btn" onclick="saveVehiculo()">Guardar</button>
            </div>

         </div>

      </div>
   </div>

   <script src="/js/vehiculos2.js"></script>

   </body>
   </html>
