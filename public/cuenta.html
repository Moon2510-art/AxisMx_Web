<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea tu cuenta | AxisMX</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Dropdown styles for roles */
        .dropdown {
            position: relative;
            cursor: pointer;
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            background: #fff;
            display: none;
            z-index: 10;
        }

        .dropdown-list.show {
            display: block;
        }

        .dropdown-list div {
            padding: 8px 12px;
        }

        .dropdown-list div:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="gradient-bg"></div>
        <div class="particles"></div>
    </div>
    <div class="container">
        <div class="account-wrapper">
            <div class="account-right">
                <div class="account-card">
                    <div class="card-header">
                        <h2>Crea tu cuenta</h2>
                        <p>Completa tu información para crear tu cuenta</p>
                    </div>
                    <form id="visitaForm" class="account-form">
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-id-badge"></i></div>
                            <div class="input-field">
                                <label>Matrícula</label>
                                <input type="text" placeholder="Ej. 124055888 (Opcional)" id="matricula">
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-user-tie"></i></div>
                            <div class="input-field">
                                <label>Número de Empleado</label>
                                <input type="text" placeholder="Ej. EMP001 (Opcional)" id="numero_empleado">
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-user"></i></div>
                            <div class="input-field">
                                <label>Nombre</label>
                                <input type="text" placeholder="Ej. Juan" id="nombre" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-user"></i></div>
                            <div class="input-field">
                                <label>Apellido Paterno</label>
                                <input type="text" placeholder="Ej. Perez" id="apellido_paterno" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-user"></i></div>
                            <div class="input-field">
                                <label>Apellido Materno</label>
                                <input type="text" placeholder="Ej. Huerta" id="apellido_materno">
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-envelope"></i></div>
                            <div class="input-field">
                                <label>Email</label>
                                <input type="email" placeholder="Ej. correo@mail.com" id="email" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-phone"></i></div>
                            <div class="input-field">
                                <label>Teléfono</label>
                                <input type="text" placeholder="Ej. 4425584477" id="telefono">
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-building"></i></div>
                            <div class="input-field">
                                <label>Empresa</label>
                                <input type="text" placeholder="Ej. Huawei (Opcional)" id="empresa">
                            </div>
                        </div>

                        <div class="input-group">
                            <div class="input-icon"><i class="fas fa-id-badge"></i></div>
                            <div class="input-field">
                                <label class="input-label-left">Rol</label>
                                <select id="edit_rol">
                                    <option value="1">Alumno</option>
                                    <option value="2">Maestro</option>
                                    <option value="3">Administrativo</option>
                                    <option value="4">Seguridad</option>
                                    <option value="5">Empleado_Oxxo</option>
                                    <option value="6">Empleado_KFeteria</option>
                                    <option value="7">Empleado_Salud</option>
                                    <option value="8">Empleado_Limpieza</option>
                                    <option value="9">Empleado_Mantenimiento</option>
                                    <option value="11">Conductor</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group password-wrapper">
                            <div class="input-icon"><i class="fas fa-key"></i></div>
                            <div class="input-field">
                                <label>Contraseña</label>
                                <input type="password" placeholder="******" id="password">
                            </div>
                        </div>
                        <button type="submit" class="account-btn">Registra tu cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Your JS -->
    <script src="/js/crear.js"></script>
</body>
</html>
